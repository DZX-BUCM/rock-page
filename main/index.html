<!doctype html>
<html lang="zh-CN">
<head>
  <!-- 基础信息 -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>网址大全</title>

  <!-- 网站图标 -->
  <link rel="icon" href="favicon/shizi.png" />

  <!-- 样式文件：
       main.css   = 页面主体样式
       sidebar.css = 左侧侧边栏样式 -->
  <link rel="stylesheet" href="main.css" />
  <link rel="stylesheet" href="sidebar.css" />
</head>

<body>

  <!-- ======================================================
       1) 左侧侧边栏开关按钮
       点击后配合 sidebar.js 实现展开 / 收起
       ====================================================== -->
  <button class="sidebar-toggle">☰</button>


  <!-- ======================================================
       2) 左侧侧边栏
       这里放你常用的快捷入口
       ====================================================== -->
  <div class="sidebar collapsed">

    <!-- GitHub -->
    <a class="side-item" href="https://github.com" target="_blank">
      <div class="side-logo">🐙</div>
      <div class="side-label">
        <div class="side-title">GitHub</div>
        <div class="side-desc">软件源代码托管服务平台</div>
      </div>
    </a>

    <!-- 中国知网 -->
    <a class="side-item" href="https://www.cnki.net" target="_blank">
      <div class="side-logo">📚</div>
      <div class="side-label">
        <div class="side-title">中国知网</div>
        <div class="side-desc">学术文献数据库</div>
      </div>
    </a>

    <!-- 四诊计算平台 -->
    <a class="side-item" href="http://47.93.62.103:9765/healthypc/index.html/#/login" target="_blank">
      <div class="side-logo">🧮</div>
      <div class="side-label">
        <div class="side-title">四诊计算平台</div>
        <div class="side-desc">中医四诊计算平台</div>
      </div>
    </a>

    <!-- TCMBank -->
    <a class="side-item" href="https://tcmbank.cn/" target="_blank">
      <div class="side-logo">🏦</div>
      <div class="side-label">
        <div class="side-title">TCMBank</div>
        <div class="side-desc">中医知识库平台</div>
      </div>
    </a>

    <!-- DeepSeek -->
    <a class="side-item" href="https://chat.deepseek.com" target="_blank">
      <div class="side-logo">🧠</div>
      <div class="side-label">
        <div class="side-title">DeepSeek</div>
        <div class="side-desc">大模型对话平台</div>
      </div>
    </a>

    <!-- 豆包 -->
    <a class="side-item" href="https://www.doubao.com" target="_blank">
      <div class="side-logo">🤖</div>
      <div class="side-label">
        <div class="side-title">豆包</div>
        <div class="side-desc">智能 AI 助手</div>
      </div>
    </a>

    <!-- Vercel -->
    <a class="side-item" href="https://vercel.com" target="_blank">
      <div class="side-logo">▲</div>
      <div class="side-label">
        <div class="side-title">Vercel</div>
        <div class="side-desc">前端部署平台</div>
      </div>
    </a>

    <!-- 机场 -->
    <a class="side-item" href="https://xn--4gqx1hgtfdmt.com/#/dashboard" target="_blank">
      <div class="side-logo">✈️</div>
      <div class="side-label">
        <div class="side-title">机场</div>
        <div class="side-desc">代理面板</div>
      </div>
    </a>

  </div>


  <!-- ======================================================
       3) 主体内容容器
       你原来的 header / hero / 分类栏 / 卡片区 都放这里
       collapsed 类一般是配合侧边栏一起联动的
       ====================================================== -->
  <div class="main-wrapper collapsed">

    <!-- ====================================================
         3.1 顶部题头
         左边是邮箱直达，右边是几个快捷导航
         ==================================================== -->
    <header class="topic" role="banner">
      <div class="bar" id="topic-bar">

        <!-- 品牌入口 / 邮箱直达 -->
        <a class="brand" href="../add/youxianghewangpan.html" target="_blank" rel="noopener">
          <img src="favicon/ico.png" alt="" onerror="this.style.display='none'" />
          <div class="brand-text">
            <strong>通讯面板</strong>
            <small>邮箱网盘一站式管理</small>
          </div>
        </a>

        <!--
          说明：
          你这里原来把 nav 注释掉了，我保持不动，避免影响你当前样式和功能。
          所以下面这些导航链接，仍然直接放在 .bar 里面。
        -->

        <a class="nav-item active" href="https://chatgpt.com/" target="_blank">
          GPT便捷入口~
          <em class="badge badge-red">精选</em>
        </a>

        <a class="nav-item" href="https://cas.bucm.edu.cn/cas/login?service=https%3A%2F%2Fcas.bucm.edu.cn%2Fcas%2Foauth2.0%2FcallbackAuthorize%3Fsession_state%3D6B234DA998DEFC48EE5FDFB822FC7C4E" target="_blank">
          数字北中医
          <em class="badge badge-sand">New</em>
        </a>

        <a class="nav-item" href="https://rushiwowen.co/chat" target="_blank">
          大乘佛法
        </a>

        <a class="nav-item" href="../private/info.html" target="_blank">
          私密信息
          <span class="chev"></span>
        </a>

      </div>
    </header>


    <!-- ====================================================
         3.2 Hero 搜索区
         包含：动态标题、搜索框、搜索按钮、搜索引擎按钮
         ==================================================== -->
    <section class="hero">
      <div class="hero-shell">
        <h1 class="hero-title">
          <span class="title-dynamic-wrap" aria-live="polite">
            <span id="hero-rotating-text" class="hero-rotating-text">小D的门面 ✦</span>
          </span>
        </h1>
    
        <nav class="hero-tabs"></nav>
    
        <div class="search-wrap">
          <input
            id="search-input"
            class="search-input"
            placeholder="嗨~今天有什么想问的？"
          />
          <button id="search-btn" class="search-btn" aria-label="搜索">
            点一下就知道~
          </button>
        </div>
    
        <div id="engine-pills" class="engine-pills"></div>
      </div>
    </section>


    <!-- ====================================================
         3.3 横向分类栏
         会由 main.js 动态渲染分类卡片
         ==================================================== -->
    <section class="rock" aria-label="滚动栏目">

      <!-- 可滚动区域 -->
      <div class="rock-viewport" id="rock-viewport">
        <div class="rock-list" id="rock-list"></div>
      </div>

      <!-- 左右翻页按钮 -->
      <button class="rock-arrow rock-prev" aria-label="上一页">‹</button>
      <button class="rock-arrow rock-next" aria-label="下一页">›</button>
    </section>


    <!-- ====================================================
         3.4 主卡片列表区
         网站卡片会由 main.js 动态渲染到这里
         ==================================================== -->
    <main class="grid" id="grid"></main>

  </div>


  <!-- ======================================================
       4) 脚本文件
       main.js    = 主逻辑（卡片、搜索、分类、标题轮播等）
       sidebar.js = 左侧侧边栏展开 / 收起逻辑
       注意：这里保持你原来的引用顺序，不乱动
       ====================================================== -->
  <script src="main.js" defer></script>
  <script src="sidebar.js"></script>

</body>
</html>
